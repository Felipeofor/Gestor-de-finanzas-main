<main class="container page-shell">
  <h1>Quiero ser millonario</h1>

  <section class="panel">
    <div class="row g-3">
      <div class="col-12 col-md-6">
        <label for="tiempo" class="form-label">¿En cuántos años querés lograrlo?</label>
        <input type="number" min="1" [(ngModel)]="inputTiempo" class="form-control" id="tiempo">
        <span *ngIf="alerta" class="form-error">Ingresá al menos un año.</span>
      </div>
      <div class="col-12 col-md-6">
        <label for="millones" class="form-label">¿Cuál es tu objetivo?</label>
        <input type="number" min="1000000" [(ngModel)]="inputMillones" class="form-control" id="millones">
        <span *ngIf="alertaMillones" class="form-error">Ingresá al menos un millón.</span>
      </div>
    </div>

    <button type="button" (click)="calcularMillonario()" class="btn btn-primary mt-3">Calcular</button>
  </section>

  <section *ngIf="mostrarResultado" class="panel result-panel mt-4">
    <h2>Necesitás generar ${{ currency(resultado) }} por día.</h2>
    <p>Construir riqueza es una maratón, no una carrera.</p>
  </section>
</main>
